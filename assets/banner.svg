<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 120" width="520" height="120">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#08090e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#111220;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B4A" />
      <stop offset="50%" style="stop-color:#FF4D6D" />
      <stop offset="100%" style="stop-color:#C94AFF" />
    </linearGradient>
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B4A;stop-opacity:0.7" />
      <stop offset="100%" style="stop-color:#C94AFF;stop-opacity:0.2" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="520" height="120" rx="16" fill="url(#bg)"/>

  <!-- Brain/memory icon -->
  <g transform="translate(16, 12)">
    <!-- Outer ring pulse -->
    <circle cx="48" cy="48" r="44" fill="none" stroke="url(#ringGrad)" stroke-width="1.2" opacity="0.4"/>
    <!-- Inner ring -->
    <circle cx="48" cy="48" r="32" fill="none" stroke="#FF4D6D" stroke-width="0.6" opacity="0.2"/>

    <!-- Core node (glowing) -->
    <circle cx="48" cy="48" r="14" fill="#0c0d16" filter="url(#glow)"/>
    <circle cx="48" cy="48" r="12" fill="none" stroke="url(#accentGrad)" stroke-width="2" opacity="0.9"/>
    <circle cx="48" cy="48" r="5.5" fill="url(#accentGrad)" opacity="0.85"/>

    <!-- Memory nodes (orbital) -->
    <circle cx="48" cy="4" r="3.5" fill="#FF6B4A" opacity="0.9" filter="url(#softglow)"/>
    <circle cx="85" cy="28" r="3" fill="#FF4D6D" opacity="0.7" filter="url(#softglow)"/>
    <circle cx="85" cy="68" r="2.5" fill="#C94AFF" opacity="0.55"/>
    <circle cx="48" cy="92" r="2" fill="#9F5AFF" opacity="0.35"/>
    <circle cx="11" cy="68" r="1.5" fill="#7C5AFF" opacity="0.25"/>
    <circle cx="11" cy="28" r="2" fill="#FF6B4A" opacity="0.4"/>

    <!-- Connection lines (neural paths) -->
    <line x1="48" y1="7.5" x2="48" y2="34" stroke="#FF6B4A" stroke-width="0.9" opacity="0.35" stroke-dasharray="2 3"/>
    <line x1="82" y1="30" x2="58" y2="42" stroke="#FF4D6D" stroke-width="0.9" opacity="0.3" stroke-dasharray="2 3"/>
    <line x1="82" y1="66" x2="58" y2="54" stroke="#C94AFF" stroke-width="0.8" opacity="0.25" stroke-dasharray="2 3"/>
    <line x1="14" y1="30" x2="38" y2="42" stroke="#FF6B4A" stroke-width="0.7" opacity="0.2" stroke-dasharray="2 3"/>
    <line x1="14" y1="66" x2="38" y2="54" stroke="#9F5AFF" stroke-width="0.6" opacity="0.15" stroke-dasharray="2 3"/>
  </g>

  <!-- TOTAL text -->
  <text x="120" y="52" font-family="'Inter', 'SF Pro Display', -apple-system, sans-serif"
        font-size="36" font-weight="800" fill="#e8eaf0" letter-spacing="4">TOTAL</text>

  <!-- RECALL text (gradient) -->
  <text x="275" y="52" font-family="'Inter', 'SF Pro Display', -apple-system, sans-serif"
        font-size="36" font-weight="800" fill="url(#accentGrad)" letter-spacing="4">RECALL</text>

  <!-- Tagline -->
  <text x="120" y="74" font-family="'Inter', -apple-system, sans-serif"
        font-size="12" fill="#8b95a8" letter-spacing="1.5">YOUR AI REMEMBERS EVERYTHING</text>

  <!-- Accent line -->
  <line x1="120" y1="84" x2="500" y2="84" stroke="url(#accentGrad)" stroke-width="0.5" opacity="0.3"/>

  <!-- Neural wave (decorative) -->
  <path d="M 120 98 Q 200 91 280 99 Q 360 107 420 98 Q 470 94 500 96"
        fill="none" stroke="url(#accentGrad)" stroke-width="1" opacity="0.2" stroke-dasharray="3,4"/>
</svg>
